{% extends "base.html" %}
{% block title %}Datei hochladen - CostHarbor{% endblock %}
{% block content %}
<h2><i class="bi bi-upload"></i> CSV-Datei hochladen</h2>
{% if error %}
<div class="alert alert-danger">{{ error }}</div>
{% endif %}
<form method="post" action="/imports/upload" enctype="multipart/form-data" class="mt-3">
  <div class="row g-3">
    <div class="col-md-6">
      <label for="source_connection_id" class="form-label">Datenquelle *</label>
      <select class="form-select" id="source_connection_id" name="source_connection_id" required>
        <option value="">-- Quelle waehlen --</option>
        {% for src in sources %}
        <option value="{{ src.id }}">{{ src.name }} ({{ src.source_type }})</option>
        {% endfor %}
      </select>
    </div>
    <div class="col-md-6">
      <label for="file" class="form-label">CSV-Datei * (max {{ max_size_mb | default(50) }} MB)</label>
      <input type="file" class="form-control" id="file" name="file" accept=".csv" required>
    </div>
  </div>
  <div class="mt-3">
    <button type="submit" class="btn btn-primary"><i class="bi bi-upload"></i> Hochladen</button>
    <a href="/imports" class="btn btn-secondary">Abbrechen</a>
  </div>
</form>
{% endblock %}
