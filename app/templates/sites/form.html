{% extends "base.html" %}

{% block title %}{{ "Standort bearbeiten" if site else "Neuer Standort" }} - CostHarbor{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-8">
    <h1 class="mb-4">
      <i class="bi bi-buildings"></i>
      {{ "Standort bearbeiten" if site else "Neuer Standort" }}
    </h1>

    <form method="post" action="{{ '/sites/%s/edit' | format(site.id) if site else '/sites/new' }}">
      <div class="card">
        <div class="card-body">
          <div class="mb-3">
            <label for="name" class="form-label">Name <span class="text-danger">*</span></label>
            <input type="text" class="form-control" id="name" name="name"
                   value="{{ site.name if site else '' }}" required>
          </div>

          <div class="mb-3">
            <label for="address" class="form-label">Adresse</label>
            <input type="text" class="form-control" id="address" name="address"
                   value="{{ site.address if site else '' }}">
          </div>

          <div class="row">
            <div class="col-md-6 mb-3">
              <label for="city" class="form-label">Stadt</label>
              <input type="text" class="form-control" id="city" name="city"
                     value="{{ site.city if site else '' }}">
            </div>
            <div class="col-md-3 mb-3">
              <label for="postal_code" class="form-label">PLZ</label>
              <input type="text" class="form-control" id="postal_code" name="postal_code"
                     value="{{ site.postal_code if site else '' }}">
            </div>
            <div class="col-md-3 mb-3">
              <label for="country" class="form-label">Land</label>
              <input type="text" class="form-control" id="country" name="country"
                     value="{{ site.country if site else 'DE' }}">
            </div>
          </div>

          <div class="mb-3">
            <label for="total_area_sqm" class="form-label">Gesamtfl&auml;che (m&sup2;)</label>
            <input type="number" class="form-control" id="total_area_sqm" name="total_area_sqm"
                   step="0.01" min="0"
                   value="{{ site.total_area_sqm if site else '' }}">
          </div>

          <div class="mb-3">
            <label for="notes" class="form-label">Notizen</label>
            <textarea class="form-control" id="notes" name="notes" rows="3">{{ site.notes if site else '' }}</textarea>
          </div>
        </div>

        <div class="card-footer d-flex justify-content-between">
          <a href="/sites" class="btn btn-secondary">
            <i class="bi bi-arrow-left"></i> Zur&uuml;ck
          </a>
          <button type="submit" class="btn btn-primary">
            <i class="bi bi-check-lg"></i> Speichern
          </button>
        </div>
      </div>
    </form>
  </div>
</div>
{% endblock %}
