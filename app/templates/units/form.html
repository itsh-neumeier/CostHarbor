{% extends "base.html" %}

{% block title %}{{ "Einheit bearbeiten" if unit else "Neue Einheit" }} - CostHarbor{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-8">
    <h1 class="mb-4">
      <i class="bi bi-door-open"></i>
      {{ "Einheit bearbeiten" if unit else "Neue Einheit" }}
    </h1>

    <form method="post" action="{{ '/units/%s/edit' | format(unit.id) if unit else '/units/new' }}">
      <div class="card">
        <div class="card-body">
          <div class="mb-3">
            <label for="site_id" class="form-label">Standort <span class="text-danger">*</span></label>
            <select class="form-select" id="site_id" name="site_id" required>
              <option value="">— Standort w&auml;hlen —</option>
              {% for site in sites %}
              <option value="{{ site.id }}"
                      {% if unit and unit.site_id == site.id %}selected{% endif %}>
                {{ site.name }}
              </option>
              {% endfor %}
            </select>
          </div>

          <div class="mb-3">
            <label for="name" class="form-label">Name <span class="text-danger">*</span></label>
            <input type="text" class="form-control" id="name" name="name"
                   value="{{ unit.name if unit else '' }}" required>
          </div>

          <div class="mb-3">
            <label for="area_sqm" class="form-label">Fl&auml;che (m&sup2;)</label>
            <input type="number" class="form-control" id="area_sqm" name="area_sqm"
                   step="0.01" min="0"
                   value="{{ unit.area_sqm if unit else '' }}">
          </div>

          <div class="mb-3">
            <label for="description" class="form-label">Beschreibung</label>
            <textarea class="form-control" id="description" name="description" rows="3">{{ unit.description if unit else '' }}</textarea>
          </div>
        </div>

        <div class="card-footer d-flex justify-content-between">
          <a href="/units" class="btn btn-secondary">
            <i class="bi bi-arrow-left"></i> Zur&uuml;ck
          </a>
          <button type="submit" class="btn btn-primary">
            <i class="bi bi-check-lg"></i> Speichern
          </button>
        </div>
      </div>
    </form>
  </div>
</div>
{% endblock %}
