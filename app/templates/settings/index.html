{% extends "base.html" %}
{% block title %}Einstellungen - CostHarbor{% endblock %}
{% block content %}
<h2><i class="bi bi-gear"></i> Einstellungen</h2>
<div class="row g-4 mt-2">
  <div class="col-md-6">
    <div class="card">
      <div class="card-header">System</div>
      <div class="card-body">
        <table class="table table-sm mb-0">
          <tr><td><strong>Version</strong></td><td>{{ version }}</td></tr>
          <tr><td><strong>Datenbank</strong></td><td><span class="badge bg-success">Verbunden</span></td></tr>
        </table>
      </div>
    </div>
  </div>
  <div class="col-md-6">
    <div class="card">
      <div class="card-header">Schnellzugriff</div>
      <div class="card-body">
        <a href="/audit" class="btn btn-outline-primary btn-sm mb-1"><i class="bi bi-journal-text"></i> Audit-Log</a>
        <a href="/billing/rules" class="btn btn-outline-primary btn-sm mb-1"><i class="bi bi-tags"></i> Preisregeln</a>
        <a href="/sources/mappings" class="btn btn-outline-primary btn-sm mb-1"><i class="bi bi-diagram-3"></i> Entity-Mapping</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
