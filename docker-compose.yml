services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: costharbor
      POSTGRES_PASSWORD: costharbor
      POSTGRES_DB: costharbor
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U costharbor"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    env_file: .env
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - app_data:/data
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  app_data:
