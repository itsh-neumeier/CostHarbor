## CostHarbor – Portainer Stack
## Deploy via Portainer > Stacks > Add Stack > Web editor
## Paste this file and set the environment variables below.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: costharbor
      POSTGRES_PASSWORD: ${DB_PASSWORD:-costharbor}
      POSTGRES_DB: costharbor
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U costharbor"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: ghcr.io/itsh-neumeier/costharbor:latest
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      DATABASE_URL: postgresql://costharbor:${DB_PASSWORD:-costharbor}@db:5432/costharbor
      SECRET_KEY: ${SECRET_KEY}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      APP_HOST: "0.0.0.0"
      APP_PORT: "8000"
      APP_ENV: production
      LOG_LEVEL: info
      UPLOAD_DIR: /data/uploads
      DOCUMENT_DIR: /data/documents
      MAX_UPLOAD_SIZE_MB: "50"
    volumes:
      - app_uploads:/data/uploads
      - app_documents:/data/documents
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  app_uploads:
  app_documents:
