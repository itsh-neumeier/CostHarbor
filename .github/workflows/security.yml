name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

jobs:
  dependency-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pip-audit
      - run: pip install -e .
      - run: pip-audit

  container-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t costharbor:scan .
      - uses: aquasecurity/trivy-action@master
        with:
          image-ref: costharbor:scan
          format: table
          exit-code: 1
          severity: HIGH,CRITICAL
          ignore-unfixed: true
